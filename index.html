<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Cloud Generator — FunForrest</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1A0D00;
    --bg2: #241200;
    --gold: #DDC165;
    --gold-light: #FFE9A3;
    --orange: #E5591C;
    --text: #DDC165;
    --text-dim: #8a7a4a;
    --border: #3a2a10;
  }

  @font-face {
    font-family: 'System';
    src: local('-apple-system'), local('BlinkMacSystemFont'), local('Segoe UI');
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 0;
  }

  header {
    grid-column: 1 / -1;
    padding: 16px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }

  header h1 span {
    color: var(--orange);
  }

  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  textarea {
    background: var(--bg);
    color: var(--gold-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    min-height: 140px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(221, 193, 101, 0.15);
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .control-row label {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
  }

  select, input[type="number"] {
    background: var(--bg);
    color: var(--gold-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
  }

  select:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--gold);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(221, 193, 101, 0.4);
  }

  .range-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .range-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .range-header label {
    font-size: 13px;
    color: var(--text);
  }

  .range-value {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .shape-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .shape-btn {
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .shape-btn:hover {
    border-color: var(--gold);
    color: var(--text);
  }

  .shape-btn.active {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(229, 89, 28, 0.1);
  }

  .palette-row {
    display: flex;
    gap: 6px;
  }

  .palette-btn {
    flex: 1;
    height: 32px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .palette-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    display: flex;
  }

  .palette-btn:hover {
    transform: scale(1.05);
  }

  .palette-btn.active {
    border-color: var(--gold-light);
    box-shadow: 0 0 12px rgba(221, 193, 101, 0.3);
  }

  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--orange), #c44a16);
    color: #fff;
    box-shadow: 0 2px 12px rgba(229, 89, 28, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(229, 89, 28, 0.4);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--gold);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    background: rgba(221, 193, 101, 0.05);
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn-row .btn {
    flex: 1;
  }

  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .canvas-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 80px rgba(221, 193, 101, 0.03);
  }

  #cloud-canvas {
    display: block;
    background: var(--bg);
  }

  .empty-state {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    pointer-events: none;
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  .generating {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--gold);
    font-size: 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .generating.active {
    opacity: 1;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .word-count-badge {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(26, 13, 0, 0.85);
    color: var(--text-dim);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .preset-chip {
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-chip:hover {
    border-color: var(--gold);
    color: var(--text);
  }

  .font-select {
    width: 100%;
  }

  @media (max-width: 800px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
    }
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 40vh;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Word <span>Cloud</span></h1>
  </header>

  <aside class="sidebar">
    <div class="input-group">
      <div class="section-label">Text Input</div>
      <textarea id="text-input" placeholder="Paste or type text here...&#10;&#10;Words that appear more often will be larger."></textarea>
      <div class="presets">
        <button class="preset-chip" data-preset="lorem">Lorem Ipsum</button>
        <button class="preset-chip" data-preset="shakespeare">Shakespeare</button>
        <button class="preset-chip" data-preset="tech">Tech Buzzwords</button>
        <button class="preset-chip" data-preset="nature">Nature</button>
      </div>
    </div>

    <div class="controls">
      <div class="section-label">Layout</div>

      <div class="shape-grid" id="shape-grid">
        <button class="shape-btn active" data-shape="circle">Circle</button>
        <button class="shape-btn" data-shape="rect">Rectangle</button>
        <button class="shape-btn" data-shape="diamond">Diamond</button>
        <button class="shape-btn" data-shape="heart">Heart</button>
        <button class="shape-btn" data-shape="star">Star</button>
        <button class="shape-btn" data-shape="triangle">Triangle</button>
      </div>

      <div class="range-row">
        <div class="range-header">
          <label>Max Words</label>
          <span class="range-value" id="max-words-val">150</span>
        </div>
        <input type="range" id="max-words" min="20" max="400" value="150">
      </div>

      <div class="range-row">
        <div class="range-header">
          <label>Rotation Spread</label>
          <span class="range-value" id="rotation-val">45°</span>
        </div>
        <input type="range" id="rotation" min="0" max="90" value="45">
      </div>

      <div class="range-row">
        <div class="range-header">
          <label>Spacing</label>
          <span class="range-value" id="spacing-val">4</span>
        </div>
        <input type="range" id="spacing" min="1" max="12" value="4">
      </div>

      <div class="section-label">Style</div>

      <div class="control-row">
        <label>Font</label>
        <select id="font-select" class="font-select">
          <option value="system-ui, sans-serif">System Sans</option>
          <option value="Georgia, serif">Georgia Serif</option>
          <option value="'Courier New', monospace">Monospace</option>
          <option value="Impact, sans-serif">Impact</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
          <option value="Palatino, serif">Palatino</option>
        </select>
      </div>

      <div class="section-label">Palette</div>
      <div class="palette-row" id="palette-row"></div>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
      <button class="btn btn-primary" id="generate-btn">Generate Cloud</button>
      <div class="btn-row">
        <button class="btn btn-secondary" id="export-png">PNG</button>
        <button class="btn btn-secondary" id="export-svg">SVG</button>
      </div>
    </div>
  </aside>

  <main class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="cloud-canvas" width="800" height="600"></canvas>
    </div>
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 0 0 .9-9.9A7 7 0 0 0 3 10.1V15z"/>
      </svg>
      <p>Paste some text and hit Generate<br>to create your word cloud.</p>
    </div>
    <div class="generating" id="generating">
      <div class="spinner"></div>
      Placing words...
    </div>
    <div class="word-count-badge" id="word-count" style="display:none;">0 words placed</div>
  </main>
</div>

<script>
(() => {
  // --- Palettes ---
  const palettes = [
    { name: 'FunForrest', colors: ['#DDC165', '#FFE9A3', '#E5591C', '#c44a16', '#8a7a4a', '#ffe0b2'] },
    { name: 'Ocean', colors: ['#64b5f6', '#4dd0e1', '#81c784', '#aed581', '#fff176', '#4fc3f7'] },
    { name: 'Neon', colors: ['#ff6ec7', '#39ff14', '#ff3f3f', '#00f0ff', '#ffff33', '#bf40bf'] },
    { name: 'Sunset', colors: ['#ff7043', '#ffca28', '#ef5350', '#ff8a65', '#ffd54f', '#e57373'] },
    { name: 'Mono', colors: ['#ffffff', '#cccccc', '#999999', '#e0e0e0', '#b0b0b0', '#f5f5f5'] },
  ];

  let currentPalette = 0;

  // Build palette buttons
  const paletteRow = document.getElementById('palette-row');
  palettes.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'palette-btn' + (i === 0 ? ' active' : '');
    btn.title = p.name;
    btn.style.background = `linear-gradient(135deg, ${p.colors[0]}, ${p.colors[2]}, ${p.colors[1]})`;
    btn.addEventListener('click', () => {
      currentPalette = i;
      paletteRow.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    paletteRow.appendChild(btn);
  });

  // --- Presets ---
  const presets = {
    lorem: `Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua Ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur Excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum`,
    shakespeare: `To be or not to be that is the question Whether tis nobler in the mind to suffer The slings and arrows of outrageous fortune Or to take arms against a sea of troubles And by opposing end them To die to sleep No more and by a sleep to say we end The heartache and the thousand natural shocks That flesh is heir to Tis a consummation devoutly to be wished To die to sleep To sleep perchance to dream Ay there is the rub For in that sleep of death what dreams may come When we have shuffled off this mortal coil Must give us pause love beauty truth honor time world soul light dark fate hope dream passion spirit life death rose kingdom crown sword night stars heaven earth power glory wisdom peace war eternal heart blood fire ice storm gentle noble brave wild ancient sacred golden silver phantom ghost shadow whisper thunder flame ocean mountain river forest dawn dusk twilight moonlight sunlight storm tempest harmony melody rhythm dance music sing song poetry verse prose tale story legend myth hero villain magic spell enchant bewitch charm grace divine celestial infinite eternal immortal`,
    tech: `artificial intelligence machine learning deep learning neural network transformer attention mechanism large language model generative AI diffusion model reinforcement learning computer vision natural language processing embedding vector database retrieval augmented generation fine tuning prompt engineering chain of thought reasoning agent autonomous system multimodal foundation model scaling law emergent behavior alignment safety interpretability bias fairness robustness adversarial training data pipeline feature engineering model serving inference optimization quantization pruning distillation federated learning edge computing cloud native microservices kubernetes docker containerization serverless function API gateway GraphQL REST webhook event driven architecture message queue streaming processing real time analytics dashboard monitoring observability logging tracing metrics distributed system consensus algorithm blockchain smart contract decentralized protocol cryptography zero knowledge proof homomorphic encryption quantum computing qubit superposition entanglement`,
    nature: `forest mountain river ocean sunset sunrise dawn twilight meadow valley canyon desert bloom wildflower moss lichen bark root canopy understory fern mushroom mycelium soil earth stone granite basalt obsidian crystal quartz geode cave stalactite waterfall rapids tide pool coral reef kelp driftwood sandstone cliff ridge summit peak glacier moraine permafrost tundra taiga steppe prairie savanna rainforest mangrove delta estuary lagoon archipelago volcano caldera geyser hot spring aurora borealis constellation nebula galaxy cosmos eclipse meteor comet solstice equinox monsoon typhoon lightning thunder rainbow fog mist dew frost snow avalanche erosion sediment fossil amber petrified ancient primordial wilderness pristine untamed wild feral majestic serene tranquil ethereal luminous iridescent bioluminescent`,
  };

  document.querySelectorAll('.preset-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('text-input').value = presets[chip.dataset.preset];
    });
  });

  // --- Shape masks ---
  function inShape(shape, x, y, cx, cy, rx, ry) {
    const nx = (x - cx) / rx;
    const ny = (y - cy) / ry;
    switch (shape) {
      case 'circle': return nx * nx + ny * ny <= 1;
      case 'rect': return Math.abs(nx) <= 1 && Math.abs(ny) <= 1;
      case 'diamond': return Math.abs(nx) + Math.abs(ny) <= 1;
      case 'heart': {
        const hx = nx;
        const hy = -ny + 0.3;
        return (hx * hx + hy * hy - 1) ** 3 - hx * hx * hy * hy * hy <= 0;
      }
      case 'star': {
        const angle = Math.atan2(ny, nx);
        const r = Math.sqrt(nx * nx + ny * ny);
        const star5 = Math.cos(5 * angle) * 0.3 + 0.7;
        return r <= star5;
      }
      case 'triangle': {
        const tx = nx;
        const ty = ny;
        return ty >= -0.7 && ty <= 1 && Math.abs(tx) <= (1 - ty) * 0.6;
      }
      default: return true;
    }
  }

  // --- Shape buttons ---
  let currentShape = 'circle';
  document.getElementById('shape-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('.shape-btn');
    if (!btn) return;
    currentShape = btn.dataset.shape;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // --- Range displays ---
  const rangeIds = [
    ['max-words', 'max-words-val', v => v],
    ['rotation', 'rotation-val', v => v + '°'],
    ['spacing', 'spacing-val', v => v],
  ];
  rangeIds.forEach(([id, valId, fmt]) => {
    const el = document.getElementById(id);
    const val = document.getElementById(valId);
    el.addEventListener('input', () => val.textContent = fmt(el.value));
  });

  // --- Stop words ---
  const stopWords = new Set([
    'the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for',
    'of', 'with', 'by', 'from', 'is', 'was', 'are', 'were', 'be', 'been',
    'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would',
    'could', 'should', 'may', 'might', 'shall', 'can', 'it', 'its', 'this',
    'that', 'these', 'those', 'i', 'me', 'my', 'we', 'our', 'you', 'your',
    'he', 'him', 'his', 'she', 'her', 'they', 'them', 'their', 'what',
    'which', 'who', 'whom', 'where', 'when', 'how', 'not', 'no', 'nor',
    'if', 'then', 'than', 'so', 'as', 'up', 'out', 'about', 'into',
    'through', 'during', 'before', 'after', 'above', 'below', 'between',
    'own', 'same', 'each', 'every', 'all', 'both', 'few', 'more', 'most',
    'other', 'some', 'such', 'only', 'over', 'also', 'just', 'us',
    'tis', 'much', 'very', 'too',
  ]);

  function tokenize(text) {
    const words = text.toLowerCase().replace(/[^a-z0-9\s'-]/g, '').split(/\s+/).filter(w => w.length > 1 && !stopWords.has(w));
    const freq = {};
    words.forEach(w => freq[w] = (freq[w] || 0) + 1);
    return Object.entries(freq).sort((a, b) => b[1] - a[1]);
  }

  // --- Pixel-level collision grid ---
  class CollisionGrid {
    constructor(w, h) {
      this.w = w;
      this.h = h;
      this.grid = new Uint8Array(w * h);
    }

    isOccupied(x, y, bw, bh) {
      const x0 = Math.floor(x);
      const y0 = Math.floor(y);
      const x1 = Math.ceil(x + bw);
      const y1 = Math.ceil(y + bh);
      if (x0 < 0 || y0 < 0 || x1 > this.w || y1 > this.h) return true;
      for (let py = y0; py < y1; py++) {
        const row = py * this.w;
        for (let px = x0; px < x1; px++) {
          if (this.grid[row + px]) return true;
        }
      }
      return false;
    }

    occupy(x, y, bw, bh) {
      const x0 = Math.max(0, Math.floor(x));
      const y0 = Math.max(0, Math.floor(y));
      const x1 = Math.min(this.w, Math.ceil(x + bw));
      const y1 = Math.min(this.h, Math.ceil(y + bh));
      for (let py = y0; py < y1; py++) {
        const row = py * this.w;
        for (let px = x0; px < x1; px++) {
          this.grid[row + px] = 1;
        }
      }
    }
  }

  // --- Main generation ---
  const canvas = document.getElementById('cloud-canvas');
  const ctx = canvas.getContext('2d');
  let placedWords = []; // for SVG export

  async function generate() {
    const text = document.getElementById('text-input').value.trim();
    if (!text) return;

    const maxWords = parseInt(document.getElementById('max-words').value);
    const rotationSpread = parseInt(document.getElementById('rotation').value);
    const spacing = parseInt(document.getElementById('spacing').value);
    const font = document.getElementById('font-select').value;
    const palette = palettes[currentPalette].colors;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('generating').classList.add('active');
    document.getElementById('word-count').style.display = 'none';

    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Background with subtle radial gradient
    const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width * 0.6);
    grd.addColorStop(0, '#241200');
    grd.addColorStop(1, '#1A0D00');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const words = tokenize(text).slice(0, maxWords);
    if (words.length === 0) {
      document.getElementById('generating').classList.remove('active');
      return;
    }

    const maxFreq = words[0][1];
    const minSize = 12;
    const maxSize = 72;

    const cw = canvas.width;
    const ch = canvas.height;
    const cx = cw / 2;
    const cy = ch / 2;
    const rx = cw * 0.45;
    const ry = ch * 0.45;

    const grid = new CollisionGrid(cw, ch);
    placedWords = [];

    // Yield to UI between batches
    const batchSize = 8;
    let placed = 0;

    for (let i = 0; i < words.length; i++) {
      const [word, freq] = words[i];
      const t = (freq - 1) / (maxFreq - 1 || 1);
      const size = Math.round(minSize + (maxSize - minSize) * Math.pow(t, 0.5));
      const color = palette[i % palette.length];

      // Random rotation within spread
      let angle = 0;
      if (rotationSpread > 0) {
        const r = Math.random();
        if (r < 0.6) angle = 0;
        else if (r < 0.8) angle = -rotationSpread * Math.PI / 180;
        else angle = rotationSpread * Math.PI / 180;
      }

      ctx.font = `bold ${size}px ${font}`;
      const metrics = ctx.measureText(word);
      const tw = metrics.width;
      const th = size;

      // Bounding box after rotation
      const cosA = Math.abs(Math.cos(angle));
      const sinA = Math.abs(Math.sin(angle));
      const bw = tw * cosA + th * sinA + spacing * 2;
      const bh = tw * sinA + th * cosA + spacing * 2;

      // Archimedean spiral placement
      let didPlace = false;
      for (let step = 0; step < 2000; step++) {
        const spiralAngle = step * 0.15;
        const spiralR = step * 0.5;
        const px = cx + spiralR * Math.cos(spiralAngle) - bw / 2;
        const py = cy + spiralR * Math.sin(spiralAngle) - bh / 2;

        // Shape check (center of bounding box)
        const wordCx = px + bw / 2;
        const wordCy = py + bh / 2;
        if (!inShape(currentShape, wordCx, wordCy, cx, cy, rx, ry)) continue;

        if (!grid.isOccupied(px, py, bw, bh)) {
          grid.occupy(px, py, bw, bh);

          // Draw with glow
          ctx.save();
          ctx.translate(px + bw / 2, py + bh / 2);
          ctx.rotate(angle);
          ctx.font = `bold ${size}px ${font}`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          // Glow for top words
          if (i < 5) {
            ctx.shadowColor = color;
            ctx.shadowBlur = size * 0.4;
          }

          ctx.fillStyle = color;
          ctx.globalAlpha = 0.15 + 0.85 * Math.pow(t, 0.3);
          ctx.fillText(word, 0, 0);
          ctx.restore();

          placedWords.push({ word, x: px + bw/2, y: py + bh/2, size, angle, color, font, opacity: 0.15 + 0.85 * Math.pow(t, 0.3) });
          placed++;
          didPlace = true;
          break;
        }
      }

      if (i % batchSize === 0) {
        await new Promise(r => setTimeout(r, 0));
      }
    }

    document.getElementById('generating').classList.remove('active');
    const badge = document.getElementById('word-count');
    badge.textContent = `${placed} words placed`;
    badge.style.display = 'block';
  }

  document.getElementById('generate-btn').addEventListener('click', generate);

  // --- Export PNG ---
  document.getElementById('export-png').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'word-cloud.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // --- Export SVG ---
  document.getElementById('export-svg').addEventListener('click', () => {
    if (placedWords.length === 0) return;
    const w = canvas.width;
    const h = canvas.height;
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">\n`;
    svg += `<rect width="${w}" height="${h}" fill="#1A0D00"/>\n`;
    placedWords.forEach(pw => {
      const deg = (pw.angle * 180 / Math.PI).toFixed(1);
      svg += `<text x="${pw.x.toFixed(1)}" y="${pw.y.toFixed(1)}" `;
      svg += `font-family="${pw.font}" font-size="${pw.size}" font-weight="bold" `;
      svg += `fill="${pw.color}" opacity="${pw.opacity.toFixed(2)}" `;
      svg += `text-anchor="middle" dominant-baseline="central" `;
      if (Math.abs(pw.angle) > 0.01) {
        svg += `transform="rotate(${deg} ${pw.x.toFixed(1)} ${pw.y.toFixed(1)})" `;
      }
      svg += `>${pw.word}</text>\n`;
    });
    svg += '</svg>';

    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'word-cloud.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
  });

  // Auto-resize canvas to fit area
  function resizeCanvas() {
    const area = document.querySelector('.canvas-area');
    const pad = 48;
    const w = Math.min(1200, area.clientWidth - pad);
    const h = Math.min(800, area.clientHeight - pad);
    if (w > 0 && h > 0) {
      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
    }
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
})();
</script>
</body>
</html>
